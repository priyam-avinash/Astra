version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: astra-postgres
    environment:
      - POSTGRES_USER=astra
      - POSTGRES_PASSWORD=astra_secure_pass
      - POSTGRES_DB=astra_trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: astra-redis
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
    container_name: astra-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://astra:astra_secure_pass@db:5432/astra_trading
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=super_secret_jwt_key_astra_123
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
      - redis

  worker:
    build: 
      context: ./backend
    container_name: astra-worker
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://astra:astra_secure_pass@db:5432/astra_trading
      - REDIS_URL=redis://redis:6379/0
    command: celery -A app.services.tasks.celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
      
  frontend:
    build:
      context: ./frontend
    container_name: astra-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
